<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS — ภารกิจลงพื้นที่</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="header">
    <h1>ภารกิจลงพื้นที่</h1>
    <div class="header-sub" id="header-assignee"></div>
  </div>

  <style>
    /* OTP Screen Styles */
    .otp-container {
        max-width: 400px;
        margin: 3rem auto;
        padding: 2rem;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        text-align: center;
    }
    .otp-icon {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 1.5rem;
    }
    .otp-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; }
    .otp-desc { color: #64748b; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }
    .otp-input-group { display: flex; flex-direction: column; gap: 1rem; }
    .otp-input {
        width: 100%;
        padding: 1rem;
        border-radius: 12px;
        border: 2px solid #e2e8f0;
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 0.5rem;
        font-weight: 700;
        outline: none;
    }
    .btn-otp {
        width: 100%;
        padding: 1rem;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        font-weight: 700;
        border: none;
        cursor: pointer;
    }
    .btn-otp:disabled { opacity: 0.5; }
    .resend-link {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
    }
  </style>
  <div class="container">
    <div id="loading" class="loader"><div class="spinner"></div></div>
    
    <div id="otp-screen" class="hidden">
        <div class="otp-container">
            <div class="otp-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="otp-title">ยืนยันตัวตน</div>
            <div id="otp-desc" class="otp-desc">กรุณากดปุ่มด้านล่างเพื่อรับรหัส OTP ทางอีเมลที่ลงทะเบียนไว้</div>
            
            <div id="otp-request-step">
                <button id="request-otp-btn" class="btn-otp">รับรหัส OTP</button>
            </div>

            <div id="otp-verify-step" class="hidden">
                <div class="otp-input-group">
                    <input type="text" id="otp-input" class="otp-input" maxlength="6" placeholder="000000" inputmode="numeric">
                    <button id="verify-otp-btn" class="btn-otp">ตรวจสอบรหัส</button>
                </div>
                <div id="resend-otp-btn" class="resend-link">ส่งรหัสอีกครั้ง</div>
            </div>
        </div>
    </div>

    <div id="error-section" class="hidden"></div>

    <div id="content" class="hidden">
      <div class="card">
        <div class="card-title">ข้อมูลนักเรียน</div>
        <div class="info-row">
          <span class="label">ชื่อ</span>
          <span class="value" id="student-name"></span>
        </div>
        <div class="info-row">
          <span class="label">โรงเรียน</span>
          <span class="value" id="student-school"></span>
        </div>
        <div class="info-row">
          <span class="label">ที่อยู่</span>
          <span class="value" id="student-address"></span>
        </div>
        <div class="info-row">
          <span class="label">สาเหตุ</span>
          <span class="value" id="reason-flagged"></span>
        </div>
        <div class="info-row">
          <span class="label">ส่งต่อแล้ว</span>
          <span class="value" id="depth-info"></span>
        </div>
      </div>

      <div id="map-card" class="card hidden">
        <div class="card-title">ตำแหน่งบ้านนักเรียน</div>
        <div id="map"></div>
        <a id="gmaps-link" class="btn btn-outline mt-8" target="_blank" rel="noopener">
          🗺️ เปิดใน Google Maps
        </a>
      </div>

      <div class="btn-group" id="actions">
        <a id="btn-execute" class="btn btn-success">📍 ลงพื้นที่เอง</a>
        <a id="btn-delegate" class="btn btn-warning">🔄 มอบหมายให้ผู้อื่น</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/task-view.js"></script>
</body>
</html>
