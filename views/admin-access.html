<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS — Admin Access</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <h1>Student Tracking System</h1>
    <div class="header-sub">ยืนยันสิทธิ์สำหรับผู้บริหาร/ผอ.</div>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-title">เข้าสู่โหมดผู้บริหาร</div>
      <div id="error-box" class="alert alert-error hidden">รหัสไม่ถูกต้อง กรุณาลองใหม่</div>
      <form method="POST" action="/admin-access">
        <input type="hidden" id="next-input" name="next" value="/">
        <div class="form-group">
          <label for="admin-key">รหัสผู้บริหาร</label>
          <input id="admin-key" name="admin_key" type="password" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-primary">เข้าสู่ระบบ</button>
      </form>
      <p class="hint-text mt-16">ระบบนี้ใช้รหัสกลางแบบง่ายสำหรับการใช้งานภายในเท่านั้น</p>
    </div>
  </div>

  <script>
    (function () {
      var q = new URLSearchParams(window.location.search);
      var hasError = q.get('error');
      var next = q.get('next');
      if (hasError === '1') {
        document.getElementById('error-box').classList.remove('hidden');
      }
      if (next && next.charAt(0) === '/') {
        document.getElementById('next-input').value = next;
      }
    })();
  </script>
</body>
</html>
