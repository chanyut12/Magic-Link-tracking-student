<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS — รายละเอียดภารกิจ</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="header">
    <h1>Audit Trail — รายละเอียดภารกิจ</h1>
    <div class="header-sub" id="header-info"></div>
  </div>

  <div class="container">
    <div id="loading" class="loader"><div class="spinner"></div></div>

    <div id="content" class="hidden">
      <div id="case-card" class="card">
        <div class="card-title" id="card-title-main">ข้อมูลภารกิจ</div>
        <div id="visit-info">
          <div class="info-row">
            <span class="label">ชื่อนักเรียน</span>
            <span class="value" id="student-name"></span>
          </div>
          <div class="info-row">
            <span class="label">โรงเรียน</span>
            <span class="value" id="student-school"></span>
          </div>
          <div class="info-row">
            <span class="label">สาเหตุ</span>
            <span class="value" id="reason-flagged"></span>
          </div>
        </div>
        
        <div id="attendance-info" class="hidden">
           <div class="info-row">
             <span class="label">ประเภทภารกิจ</span>
             <span class="value">เช็คชื่อรายห้อง (Attendance)</span>
           </div>
           <div class="info-row">
             <span class="label">ระดับชั้น</span>
             <span class="value" id="target-grade"></span>
           </div>
           <div class="info-row">
             <span class="label">ห้อง</span>
             <span class="value" id="target-room"></span>
           </div>
        </div>

        <div class="info-row">
          <span class="label">สถานะภาพรวม</span>
          <span id="task-status"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">เส้นทางการมอบหมาย (Delegation Chain)</div>
        <div class="timeline" id="timeline"></div>
      </div>

      <div id="submission-card" class="card hidden">
        <div class="card-title">ข้อมูลรายงานการลงพื้นที่</div>
        <div id="submission-detail"></div>
        <div id="submission-photos" class="photo-grid"></div>
        <div id="submission-map" class="submission-map"></div>
      </div>

      <div id="review-card" class="card hidden">
        <div class="card-title">การประเมินโดยผู้ดูแล/ผอ.</div>
        <div id="review-status" class="mb-16"></div>
        <div class="form-group">
          <label for="reviewed-by">ผู้ประเมิน</label>
          <input type="text" id="reviewed-by" placeholder="เช่น ผอ. โรงเรียนบ้านหนองไผ่" value="ผอ.">
        </div>
        <div class="form-group">
          <label for="review-action">ผลการประเมิน</label>
          <select id="review-action">
            <option value="ASSIST">ให้ความช่วยเหลือ</option>
            <option value="FORWARD">ส่งต่อหน่วยงาน/ผู้เกี่ยวข้อง</option>
            <option value="CLOSE">ปิดเคส</option>
          </select>
        </div>
        <div class="form-group">
          <label for="review-note">หมายเหตุการประเมิน</label>
          <textarea id="review-note" placeholder="ระบุแนวทางช่วยเหลือ/เหตุผลการปิดเคส"></textarea>
        </div>
        <button id="review-submit-btn" class="btn btn-primary">บันทึกผลการประเมิน</button>
      </div>

      <div id="review-history-card" class="card hidden">
        <div class="card-title">ประวัติการประเมิน</div>
        <div id="review-history"></div>
      </div>
    </div>

    <a href="/" class="btn btn-secondary mt-16">กลับหน้า Dashboard</a>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/task-detail.js"></script>
</body>
</html>
