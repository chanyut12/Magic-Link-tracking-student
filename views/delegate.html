<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS — ส่งต่อภารกิจ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <h1>มอบหมายภารกิจให้ผู้อื่น</h1>
    <div class="header-sub">กรอกข้อมูลผู้รับงานคนใหม่</div>
  </div>

  <div class="container">
    <div id="form-section">
      <div class="card">
        <div class="form-group">
          <label for="new_assignee_name">ชื่อผู้รับงานคนใหม่ *</label>
          <input type="text" id="new_assignee_name" placeholder="เช่น อสม. สมหญิง">
        </div>
        <div class="form-group">
          <label for="new_assignee_phone">เบอร์โทรศัพท์</label>
          <input type="tel" id="new_assignee_phone" placeholder="เช่น 089-876-5432">
        </div>
        <div class="form-group">
          <label for="expires_value">อายุลิงก์ใหม่</label>
          <div class="expiry-row">
            <input type="number" id="expires_value" value="1" min="1" max="90">
            <select id="expires_unit">
              <option value="hours">ชั่วโมง</option>
              <option value="days" selected>วัน</option>
              <option value="weeks">สัปดาห์</option>
            </select>
          </div>
        </div>
      </div>

      <button id="delegate-btn" class="btn btn-warning">🔄 ส่งต่อภารกิจ</button>
      <button id="back-btn" class="btn btn-secondary mt-8">ย้อนกลับ</button>
    </div>

    <div id="result-section" class="hidden">
      <div class="card">
        <div class="alert alert-success">ส่งต่อภารกิจสำเร็จ!</div>
        <p class="hint-text mb-12">กรุณาส่งลิงก์ด้านล่างให้ผู้รับงานคนใหม่</p>
        <div class="card-title">Magic Link ใหม่</div>
        <div class="magic-link-box" id="magic-link"></div>
        <button id="copy-btn" class="btn btn-outline">📋 คัดลอกลิงก์</button>
        <a id="line-share-btn" class="btn btn-line mt-8" target="_blank" rel="noopener">
          💬 ส่งลิงก์ผ่าน LINE
        </a>
      </div>
      <div class="card qr-section">
        <div class="card-title">QR Code</div>
        <img id="qr-img" alt="QR Code">
      </div>
    </div>
  </div>

  <script src="/js/delegate.js"></script>
</body>
</html>
